name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync-upstream:
    name: Open upstream sync PR
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: |
          git remote add upstream https://github.com/blackjax-devs/blackjax.git
          git fetch origin main
          git fetch upstream main

      - name: Merge upstream into sync branch
        id: merge
        run: |
          set -euo pipefail

          git checkout -B sync/upstream-main origin/main
          git merge --no-ff --no-edit upstream/main

          if git diff --quiet origin/main..HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push sync branch
        if: steps.merge.outputs.has_changes == 'true'
        run: git push --force-with-lease origin sync/upstream-main

      - name: Create or reuse pull request
        if: steps.merge.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_url="$(gh pr list \
            --base main \
            --head sync/upstream-main \
            --state open \
            --json url \
            --jq '.[0].url // empty')"

          if [ -n "$pr_url" ]; then
            echo "Open PR already exists: $pr_url"
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_url="$(gh pr create \
            --base main \
            --head sync/upstream-main \
            --title "Sync upstream BlackJAX" \
            --body "Automated PR to merge \`blackjax-devs/blackjax@main\` into this fork.")"

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.merge.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr merge --auto --merge "${{ steps.pr.outputs.pr_url }}"
